<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0D14"/>
      <stop offset="100%" stop-color="#0D1119"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.18" r="0.6">
      <stop offset="0%" stop-color="#C99A35" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C99A35" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#C99A35" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- top hairline -->
  <line x1="80" y1="80" x2="1120" y2="80" stroke="#C99A35" stroke-opacity="0.4" stroke-width="1"/>

  <!-- brand mark + name -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="56" height="56" rx="8" fill="#EDEAE0"/>
    <text x="28" y="38" font-family="Georgia, serif" font-size="22" font-weight="600" fill="#0A0D14" text-anchor="middle" letter-spacing="2">RAM</text>
    <text x="76" y="26" font-family="Georgia, serif" font-size="20" font-weight="500" fill="#EDEAE0" letter-spacing="-0.5">Website Builders</text>
    <text x="76" y="48" font-family="ui-monospace, monospace" font-size="11" fill="#7E8798" letter-spacing="2.5">BUILT IN 5 DAYS · EST. 2026</text>
  </g>

  <!-- main headline -->
  <g transform="translate(80, 250)">
    <text font-family="Georgia, serif" font-size="78" font-weight="500" fill="#EDEAE0" letter-spacing="-2">
      <tspan x="0" dy="0">A website that</tspan>
      <tspan x="0" dy="92">earns its </tspan>
      <tspan font-style="italic" fill="#E0B85C">keep.</tspan>
    </text>
  </g>

  <!-- subhead -->
  <g transform="translate(80, 500)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#C99A35" stroke-width="2"/>
    <text x="56" y="6" font-family="ui-monospace, monospace" font-size="18" fill="#B9C0CE" letter-spacing="0.5">From $599 · Delivered in 5 days · Money-back guaranteed</text>
  </g>

  <!-- url -->
  <text x="1120" y="572" font-family="ui-monospace, monospace" font-size="18" fill="#7E8798" letter-spacing="2" text-anchor="end">RAMWEBSITES.SITE</text>

  <!-- bottom hairline -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#C99A35" stroke-opacity="0.4" stroke-width="1"/>
</svg>
